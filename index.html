<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Mona Lisa AR</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
      #ui-container {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.95); z-index: 10000;
        display: flex; justify-content: center; align-items: center; text-align: center;
      }
      .modal {
        background: #1a1a1a; padding: 30px; border-radius: 20px;
        max-width: 85%; border: 1px solid #333; color: white;
      }
      .hidden { display: none !important; }
      .btn {
        padding: 15px 25px; margin: 10px; border: none; border-radius: 10px;
        font-weight: bold; cursor: pointer; font-size: 16px;
      }
      #btnAccept { background: #28a745; color: white; }
      #btnReject { background: #dc3545; color: white; }
      .spinner {
        width: 40px; height: 40px; border: 4px solid #f3f3f3;
        border-top: 4px solid #28a745; border-radius: 50%;
        animation: spin 1s linear infinite; margin: 0 auto 15px;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
  </head>
  <body>

    <div id="ui-container">
      <div id="loadingScreen">
        <div class="spinner"></div>
        <p>AR Modülleri Hazırlanıyor...</p>
      </div>

      <div id="warningScreen" class="modal hidden">
        <h2>⚠️ Önemli Uyarı</h2>
        <p>Deneyimi başlatmak için kamera izni vermeniz zorunludur. Görüntünüz kaydedilmez, sadece AR takibi için kullanılır.</p>
        <button id="btnAccept" class="btn">Kabul Ediyorum</button>
        <button id="btnReject" class="btn">Reddediyorum</button>
      </div>

      <div id="rejectMessage" class="modal hidden">
        <p>Kamera izni olmadan sistem çalışamaz. Lütfen sayfayı yenileyin.</p>
      </div>
    </div>

    <a-scene 
      id="mainScene"
      mindar-image="imageTargetSrc: targets.mind; autoStart: false;" 
      embedded color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="monaVideo" src="video1.mp4" preload="auto" loop crossorigin="anonymous" playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="target">
        <a-video src="#monaVideo" position="0 0 0" height="1.45" width="1"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const uiContainer = document.getElementById('ui-container');
      const loadingScreen = document.getElementById('loadingScreen');
      const warningScreen = document.getElementById('warningScreen');
      const rejectMessage = document.getElementById('rejectMessage');
      const video = document.querySelector('#monaVideo');

      // Sahne (A-Frame) tamamen yüklendiğinde
      sceneEl.addEventListener('renderstart', () => {
        loadingScreen.classList.add('hidden');
        warningScreen.classList.remove('hidden');
      });

      // Kabul Et Butonu
      document.getElementById('btnAccept').addEventListener('click', () => {
        uiContainer.classList.add('hidden');
        
        // Video ses/oynatma kilidini aç
        video.play().then(() => {
          video.pause();
        });

        // AR Sistemini Başlat
        const arSystem = sceneEl.systems["mindar-image-system"];
        if (arSystem) {
          arSystem.start(); 
        } else {
          alert("AR Sistemi henüz hazır değil, lütfen bekleyin.");
        }
      });

      // Red Et Butonu
      document.getElementById('btnReject').addEventListener('click', () => {
        warningScreen.classList.add('hidden');
        rejectMessage.classList.remove('hidden');
      });

      // AR Takip Olayları
      const target = document.querySelector('#target');
      target.addEventListener("targetFound", () => video.play());
      target.addEventListener("targetLost", () => video.pause());
    </script>
  </body>
</html>
